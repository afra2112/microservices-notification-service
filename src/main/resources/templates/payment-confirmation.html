<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
            padding:20px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#f2f2f2;
        }

        .total{
            margin-top:20px;
            font-weight:bold;
        }

        .footer{
            margin-top:30px;
            font-size:12px;
            color:#777;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Order Confirmation</h2>

    <p>Hello <strong th:text="${customerName}">Customer</strong>,</p>

    <p>
        Your order has been successfully created.
    </p>

    <p>
        <strong>Order Reference:</strong>
        <span th:text="${orderReference}">123456</span>
    </p>

    <h3>Products</h3>

    <table>

        <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="product : ${products}">
            <td th:text="${product.name}">Product Name</td>
            <td th:text="${product.price}">0.00</td>
        </tr>

        </tbody>

    </table>

    <div class="total">
        Total Amount:
        $<span th:text="${amount}">0.00</span>
    </div>

    <div class="footer">
        Thank you for your purchase.
    </div>

</div>

</body>
</html>
